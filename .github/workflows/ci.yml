name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  integration:
    runs-on: ubuntu-latest
    env:
      VSCODE_TEST_INSTALL_DIR: ${{ github.workspace }}/.vscode-test/vscode-linux-x64-stable
      VSCODE_EXECUTABLE_PATH: ${{ github.workspace }}/.vscode-test/vscode-linux-x64-stable/code

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache VS Code binary
        uses: actions/cache@v4
        with:
          path: ${{ env.VSCODE_TEST_INSTALL_DIR }}
          key: vscode-test-${{ runner.os }}-linux-x64-stable

      - name: Pre-download VS Code test binary
        run: |
          if [ ! -x "$VSCODE_EXECUTABLE_PATH" ]; then
            rm -rf "$VSCODE_TEST_INSTALL_DIR"
            mkdir -p "$VSCODE_TEST_INSTALL_DIR"
            # Use the official download site and a local executable path so CI never calls
            # update.code.visualstudio.com/api/releases/stable during test startup.
            curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 \
              "https://code.visualstudio.com/sha/download?build=stable&os=linux-x64" \
              | tar -xzf - --strip-components=1 -C "$VSCODE_TEST_INSTALL_DIR"
          fi

          test -x "$VSCODE_EXECUTABLE_PATH"

      - name: Integration tests
        run: xvfb-run -a bun run test:integration
